$kind: http-request
url: "{{baseUrl}}/api/pizzas"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Runner Pizza",
      "description": "Pizza created by the full Postman flow",
      "price": 30000,
      "available": true,
      "categoryId": {{categoryId}},
      "ingredientIds": [{{ingredientId}}]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Pizza created', function () {
        pm.response.to.have.status(201);
      });

      var response = pm.response.json();
      pm.environment.set('pizzaId', response.id);
    language: text/javascript
order: 8000
