$kind: http-request
url: "{{baseUrl}}/api/ingredients"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Runner Cheese"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Ingredient created', function () {
        pm.response.to.have.status(201);
      });

      var response = pm.response.json();
      pm.environment.set('ingredientId', response.id);
    language: text/javascript
order: 5000
